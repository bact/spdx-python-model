---
name: Publish API documentation

on:
  push:
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            RAW="${{ github.event.release.tag_name }}"
            echo "version=${RAW#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Install package and Sphinx
        run: pip install . sphinx pydata-sphinx-theme

      - name: Generate RST stubs
        run: sphinx-apidoc -f -o docs/source src/spdx_python_model

      - name: Build HTML docs
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: sphinx-build -b html docs/source docs/_build

      - name: Set up gh-pages worktree
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Fetch the remote gh-pages branch if it exists
          git fetch origin gh-pages:refs/remotes/origin/gh-pages 2>/dev/null || true

          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            # Branch exists: check it out as a detached worktree to avoid branch conflicts
            git worktree add --detach site origin/gh-pages
          else
            # Branch does not exist yet: create an orphan worktree
            git worktree add --detach site HEAD
            cd site
            git checkout --orphan gh-pages
            git rm -rf . > /dev/null 2>&1 || true
            touch .nojekyll
            cd ..
          fi

      - name: Deploy version and rebuild site metadata
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          rm -rf "site/$VERSION"
          mkdir -p "site/$VERSION"
          cp -r docs/_build/. "site/$VERSION/"

          touch site/.nojekyll

          # Rebuild versions.json and root redirect from all dirs in gh-pages
          python3 << 'PYEOF'
          import json, os, re
          from pathlib import Path

          BASE = "https://spdx.github.io/spdx-python-model"
          site = Path("site")

          def is_release_version(name):
              return bool(re.match(r"^\d+\.\d+", name))

          # Collect all versioned release dirs (semver-like names)
          releases = sorted(
              [d.name for d in site.iterdir() if d.is_dir() and is_release_version(d.name)],
              key=lambda v: tuple(int(x) for x in re.findall(r"\d+", v)),
              reverse=True,
          )

          # Releases listed newest-first
          entries = [{"name": r, "version": r, "url": f"{BASE}/{r}/"} for r in releases]
          entries.append({"name": "dev", "version": "dev", "url": f"{BASE}/dev/"})

          (site / "versions.json").write_text(json.dumps(entries, indent=2) + "\n")

          # Root index.html redirects to the latest release (or dev if none yet)
          target = releases[0] if releases else "dev"
          (site / "index.html").write_text(
              f"""<!DOCTYPE html>
          <html>
            <head>
              <meta http-equiv="refresh" content="0; url={target}/" />
              <script>window.location.href = "{target}/";</script>
            </head>
            <body>
              <p>Redirecting to <a href="{target}/">{target}</a>...</p>
            </body>
          </html>
          """
          )
          PYEOF

      - name: Commit and push to gh-pages
        run: |
          cd site
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to publish."
          else
            git commit -m "docs: publish ${{ steps.version.outputs.version }}"
            git push origin HEAD:gh-pages
          fi
